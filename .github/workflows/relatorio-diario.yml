name: Relatório diário de prazos

on:
  schedule:
    # Roda todo dia às 10:00 UTC = 07:00 BRT
    - cron: '0 10 * * 1-5'

  # Permite disparar manualmente para testar
  workflow_dispatch:

jobs:
  relatorio:
    name: Enviar relatório de prazos
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout do repositório
        uses: actions/checkout@v4

      - name: Configurar Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Instalar dependências
        run: pip install -r requirements.txt

      - name: Criar arquivo .env
        run: |
          cat > config/.env << EOF
          SAPL_BASE_URL=${{ secrets.SAPL_BASE_URL }}
          CLICKUP_API_KEY=${{ secrets.CLICKUP_API_KEY }}
          CLICKUP_TEAM_ID=${{ secrets.CLICKUP_TEAM_ID }}
          LIST_SECRETARIA=${{ secrets.LIST_SECRETARIA }}
          LIST_COMISSOES=${{ secrets.LIST_COMISSOES }}
          LIST_PROCURADORIA=${{ secrets.LIST_PROCURADORIA }}
          LIST_GABINETES=${{ secrets.LIST_GABINETES }}
          LIST_MESA_DIRETORA=${{ secrets.LIST_MESA_DIRETORA }}
          LIST_EXECUTIVO=${{ secrets.LIST_EXECUTIVO }}
          SMTP_HOST=${{ secrets.SMTP_HOST }}
          SMTP_PORT=${{ secrets.SMTP_PORT }}
          SMTP_USER=${{ secrets.SMTP_USER }}
          SMTP_PASS=${{ secrets.SMTP_PASS }}
          TELEGRAM_BOT_TOKEN=${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID=${{ secrets.TELEGRAM_CHAT_ID }}
          DESTINATARIOS_EMAIL=${{ secrets.DESTINATARIOS_EMAIL }}
          ALERTAR_DIAS_ANTES=7,3,1
          EOF

      - name: Enviar relatório de prazos
        run: |
          cd src
          python sync.py --apenas-alertas
