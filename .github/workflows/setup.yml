name: Setup inicial ClickUp

on:
  # Roda APENAS quando disparado manualmente
  workflow_dispatch:
    inputs:
      confirmar:
        description: 'Digite "confirmar" para criar a estrutura no ClickUp'
        required: true
        default: ''
      delete_space:
        description: 'ID de space anterior para deletar (deixe vazio se for a primeira vez)'
        required: false
        default: ''

jobs:
  setup:
    name: Criar estrutura no ClickUp
    runs-on: ubuntu-latest
    # Proteção: só executa se o usuário digitou "confirmar"
    if: github.event.inputs.confirmar == 'confirmar'

    steps:
      - name: Checkout do repositório
        uses: actions/checkout@v4

      - name: Configurar Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Instalar dependências
        run: pip install -r requirements.txt

      - name: Executar setup do ClickUp
        run: |
          cd src
          python setup_clickup.py \
            --api-key "${{ secrets.CLICKUP_API_KEY }}" \
            --team-id "${{ secrets.CLICKUP_TEAM_ID }}" \
            ${{ github.event.inputs.delete_space != '' && format('--delete-space "{0}"', github.event.inputs.delete_space) || '' }}

      - name: Salvar IDs gerados como artefato
        uses: actions/upload-artifact@v4
        with:
          name: clickup-ids-gerados
          path: src/ids_gerados.json
          retention-days: 90
